<div class="container">
  <h1>Edit Trip</h1>
  <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="code">Code</label>
      <input type="text" class="form-control" id="code" formControlName="code" readonly>
    </div>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" class="form-control" id="name" formControlName="name"
             [ngClass]="{ 'is-invalid': submitted && f['name'].errors }">
      <div *ngIf="submitted && f['name'].errors" class="invalid-feedback">
        <div *ngIf="f['name'].errors['required']">Name is required</div>
      </div>
    </div>
    <div class="form-group">
      <label for="length">Length</label>
      <input type="text" class="form-control" id="length" formControlName="length"
             [ngClass]="{ 'is-invalid': submitted && f['length'].errors }">
    </div>
    <div class="form-group">
      <label for="start">Start Date</label>
      <input type="text" class="form-control" id="start" formControlName="start"
             [ngClass]="{ 'is-invalid': submitted && f['start'].errors }">
    </div>
    <div class="form-group">
      <label for="resort">Resort</label>
      <input type="text" class="form-control" id="resort" formControlName="resort"
             [ngClass]="{ 'is-invalid': submitted && f['resort'].errors }">
    </div>
    <div class="form-group">
      <label for="perPerson">Price Per Person</label>
      <input type="number" class="form-control" id="perPerson" formControlName="perPerson"
             [ngClass]="{ 'is-invalid': submitted && f['perPerson'].errors }">
    </div>
    <div class="form-group">
      <label for="image">Image</label>
      <input type="text" class="form-control" id="image" formControlName="image"
             [ngClass]="{ 'is-invalid': submitted && f['image'].errors }">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea class="form-control" id="description" formControlName="description"
                [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update Trip</button>
  </form>
</div>
